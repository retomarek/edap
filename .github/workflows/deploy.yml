name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "edap/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLOTLY_RENDERER: notebook
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Build Jupyter Book (PDF)
        run: |
          jupyter-book build edap/ --builder pdfhtml
          mkdir -p edap/_build/pdf_tmp
          cp edap/_build/pdf/book.pdf edap/_build/pdf_tmp/edap.pdf

      - name: Build Jupyter Book (HTML)
        run: |
          jupyter-book build edap/
          cp edap/_build/pdf_tmp/edap.pdf edap/_build/html/edap.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: edap/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
